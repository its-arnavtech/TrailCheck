name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/trailcheck-web
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/trailcheck-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/trailcheck-api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trailcheck
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d trailcheck"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trailcheck?schema=public
      JWT_SECRET: ci-test-secret-ci-test-secret-1234
      FRONTEND_ORIGIN: http://localhost:3000
      THROTTLE_TTL_SECONDS: 60
      THROTTLE_LIMIT: 120
      GEMINI_API_KEY: ""
      NPS_API_KEY: ""
      GEMINI_MODEL: gemini-2.5-flash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/trailcheck-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx prisma db seed

      - name: Build
        run: npm run build
